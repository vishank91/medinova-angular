<app-navbar></app-navbar>

<div class="container-fluid my-3">
    <div class="row">
        <div class="col-lg-3">
            <app-admin-sidebar></app-admin-sidebar>
        </div>
        <div class="col-lg-9">
            <h5 class="bg-primary p-2 text-center text-light">Create Service <a routerLink="/admin/service"><i
                        class="bi bi-arrow-left text-light float-end"></i></a></h5>

            <form [formGroup]="myForm">
                <div class="row">
                    <div class="col-12 mb-3">
                        <label>Name*</label>
                        <input type="text" name="name" formArrayName="name" [ngClass]="name?.touched && name.invalid?'border-danger':'border-primary'" class="form-control"  placeholder="Service Name">
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<app-footer></app-footer>
